<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תודה! — DrimTeam</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#0d0d0d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo"><span class="drim">Drim</span><span class="ball"></span><span class="team">Team</span></a>
      <nav class="nav__links">
        <a href="index.html">בית</a>
        <a href="games.html">לוח משחקים</a>
        <a href="tournaments.html">טורנירים</a>
        <a href="gallery.html">גלריה</a>
        <a href="podcast.html">פודקאסט</a>
        <a href="cities.html">איפה משחקים</a>
        <a href="takanon.html">תקנון</a>
      </nav>
      <div class="nav__actions">
        <a href="register.html" class="btn btn--ghost btn--sm">התחברות</a>
        <button class="nav__toggle" aria-label="תפריט"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container" style="text-align:center;max-width:620px">
      <div class="card__icon" style="width:84px;height:84px;margin:0 auto 22px;border-radius:50%">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:42px;height:42px"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="h-lg">התשלום התקבל — נתראה במגרש! ⚽</h1>
      <p class="lead">אישור הזמנה נשלח למייל שלך. מספר הזמנה: <span class="text-lime" id="orderNo">—</span></p>
      <div class="hero__cta" style="margin-top:24px">
        <a id="waConfirm" class="btn btn--primary btn--lg btn--block" target="_blank" rel="noopener" style="display:none;background:#25d366;border-color:#25d366;color:#0a2e16">📲 קבלת אישור ותזכורת בוואטסאפ</a>
        <a href="games.html" class="btn btn--primary btn--lg btn--block">למשחקים הקרובים</a>
        <a href="index.html" class="btn btn--ghost btn--lg btn--block">חזרה לדף הבית</a>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom" style="border:none">
        <span>© 2026 DrimTeam — כל הזכויות שמורות</span>
        <span><a href="takanon.html" class="link-lime">תקנון</a></span>
      </div>
    </div>
  </footer>

  <script>
    var m = location.search.match(/order=([^&]+)/);
    if (m) document.getElementById("orderNo").textContent = decodeURIComponent(m[1]);
    // כפתור וואטסאפ — אישור + תזכורת למספר של המשתמש (לחיצה ושליחה)
    (function () {
      var reg = null;
      try { reg = JSON.parse(localStorage.getItem("dt_last_reg") || "null"); } catch (e) {}
      if (!reg || !reg.phone) return;
      var phone = (reg.phone || "").replace(/\D/g, "");
      if (phone.indexOf("0") === 0) phone = "972" + phone.slice(1);
      var timeRange = (reg.time || "") + (reg.endTime ? "–" + reg.endTime : "");
      var text = "היי 👋 אישור הרשמה ל-DrimTeam:\n⚽ " + (reg.title || "פעילות") +
        "\n🗓️ " + (reg.date || "") + " " + timeRange +
        "\nנתראה במגרש! 💚\n(שמרו הודעה זו כתזכורת — נתראה כ-5 שעות לפני 🙌)";
      var a = document.getElementById("waConfirm");
      if (a && phone) { a.href = "https://wa.me/" + phone + "?text=" + encodeURIComponent(text); a.style.display = ""; }
      try { localStorage.removeItem("dt_last_reg"); } catch (e) {}
    })();
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/chat.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
