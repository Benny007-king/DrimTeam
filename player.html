<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כרטיסיית שחקן — DrimTeam</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="theme-color" content="#0d0d0d" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Rubik:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="logo"><span class="drim">Drim</span><span class="ball"></span><span class="team">Team</span></a>
      <nav class="nav__links">
        <a href="index.html">בית</a>
        <a href="games.html">לוח משחקים</a>
        <a href="tournaments.html">טורנירים</a>
        <a href="gallery.html">גלריה</a>
        <a href="cities.html">איפה משחקים</a>
        <a href="takanon.html">תקנון</a>
      </nav>
      <div class="nav__actions">
        <a href="register.html" class="btn btn--ghost btn--sm">התחברות</a>
        <a href="register.html" class="btn btn--primary btn--sm show-mobile">הרשמה</a>
        <button class="nav__toggle" aria-label="תפריט"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <section class="section">
    <div class="container" style="max-width:840px">
      <div class="section-head" style="margin-bottom:28px">
        <span class="eyebrow">כרטיסיית שחקן</span>
        <h1 class="h-lg">הכרטיס שלי</h1>
      </div>
      <div id="cardWrap"></div>

      <h2 class="h-md" style="margin:42px 0 14px">👑 מלך השערים</h2>
      <div class="panel" id="leaderboard"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom" style="border:none">
        <span>© 2026 DrimTeam — כל הזכויות שמורות</span>
        <span><a href="gallery.html" class="link-lime">גלריה</a></span>
      </div>
    </div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    (function () {
      var wrap = document.getElementById("cardWrap"), lb = document.getElementById("leaderboard");
      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
      function initials(s) { s = (s || "").trim(); if (!s) return "👤"; var p = s.split(/\s+/); return ((p[0] && p[0][0]) || "") + ((p[1] && p[1][0]) || ""); }

      function render(member, results) {
        results = results || [];
        // טבלת מלך השערים
        var counts = {};
        results.forEach(function (r) { if (r.kingScorer) counts[r.kingScorer] = (counts[r.kingScorer] || 0) + 1; });
        var ranks = Object.keys(counts).map(function (k) { return { name: k, goals: counts[k] }; }).sort(function (a, b) { return b.goals - a.goals; }).slice(0, 10);
        lb.innerHTML = ranks.length
          ? ranks.map(function (r, i) { return '<div class="rank-row"><span class="rk">' + (i + 1) + '</span><span class="nm">' + esc(r.name) + '</span><span class="gl">' + r.goals + " 👑</span></div>"; }).join("")
          : '<div class="admin-empty">אין עדיין תוצאות משחקים.</div>';

        if (!member) {
          wrap.innerHTML = '<div class="panel admin-empty">התחברו או הירשמו כדי לראות את כרטיסיית השחקן שלכם. <a href="register.html" class="link-lime">התחברות / הרשמה ←</a></div>';
          return;
        }
        var name = member.name || "";
        var goals = results.filter(function (r) { return r.kingScorer === name; }).length;
        var wins = results.filter(function (r) { return r.winningTeam && r.teams && (r.teams[r.winningTeam] || []).indexOf(name) >= 0; }).length;
        var games = results.filter(function (r) { return r.teams && Object.keys(r.teams).some(function (c) { return (r.teams[c] || []).indexOf(name) >= 0; }); }).length;
        var photo = member.photo || "";
        var signed = member.health && member.health.accepted;
        wrap.innerHTML =
          '<div class="player-card">' +
          '<div class="player-card__avatar">' + (photo ? '<img src="' + photo + '" alt="">' : "<span>" + initials(name) + "</span>") + "</div>" +
          "<div><h2 class=\"player-card__name\">" + esc(name) + "</h2>" +
          '<p class="player-card__meta">' + (member.city ? esc(member.city) + " · " : "") + esc(member.sport || "ספורטאי/ת") + "</p>" +
          '<p class="player-card__meta">' + (signed ? "✅ חתום/ה על הצהרת בריאות ותקנון" : '⚠️ טרם חתמת על הצהרת בריאות — <a href="health.html" class="link-lime">לחתימה ←</a>') + "</p>" +
          "</div></div>" +
          '<div class="player-stats">' +
          '<div class="player-stat"><div class="n">' + games + '</div><div class="l">משחקים</div></div>' +
          '<div class="player-stat"><div class="n">' + wins + '</div><div class="l">גביעים קבוצתיים</div></div>' +
          '<div class="player-stat"><div class="n">' + goals + '</div><div class="l">פעמים מלך שערים</div></div>' +
          "</div>";
      }

      function load() {
        var mP = (window.DTDB && DTDB.getMyMember) ? DTDB.getMyMember() : Promise.resolve(null);
        var rP = (window.DTDB && DTDB.getResults) ? DTDB.getResults() : Promise.resolve([]);
        Promise.all([mP, rP]).then(function (res) { render(res[0], res[1]); });
      }
      if (window.DTDB && DTDB.onUser) DTDB.onUser(function () { load(); });
      else load();
    })();
  </script>
</body>
</html>
