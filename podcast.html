  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lbClose" aria-label="סגור">×</button>
    <button class="lightbox__nav lightbox__nav--prev" id="lbPrev" aria-label="הקודם">›</button>
    <div class="lightbox__stage" id="lbStage"></div>
    <button class="lightbox__nav lightbox__nav--next" id="lbNext" aria-label="הבא">‹</button>
    <div class="lightbox__cap" id="lbCap"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/auth-ui.js"></script>
  <script src="assets/js/chat.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    (function () {
      var grid = document.getElementById("gallery");
      var empty = document.getElementById("podEmpty");
      var ITEMS = [];
      function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c]; }); }
      function ytId(u) { var m = (u || "").match(/(?:youtu\.be\/|v=|embed\/)([\w-]{11})/); return m ? m[1] : null; }

      /* ---- Lightbox (תמונות + וידאו, דפדוף עם חיצים) ---- */
      var LB = { el: document.getElementById("lightbox"), stage: document.getElementById("lbStage"), cap: document.getElementById("lbCap"), order: [], pos: 0 };
      function lbMedia(it) {
        if (it.type === "video") {
          var id = ytId(it.url);
          if (id) return '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>';
          return '<video src="' + esc(it.url) + '" controls autoplay playsinline></video>';
        }
        return '<img src="' + esc(it.url) + '" alt="' + esc(it.caption || "") + '">';
      }
      function lbShow() {
        var it = ITEMS[LB.order[LB.pos]]; if (!it) return;
        LB.stage.innerHTML = lbMedia(it);
        LB.cap.textContent = it.caption || "";
        var many = LB.order.length > 1;
        document.getElementById("lbPrev").style.display = many ? "" : "none";
        document.getElementById("lbNext").style.display = many ? "" : "none";
      }
      function lbOpen(idx) {
        LB.order = [];
        grid.querySelectorAll(".gallery__item").forEach(function (c) {
          if (c.style.display !== "none") LB.order.push(parseInt(c.getAttribute("data-idx"), 10));
        });
        LB.pos = LB.order.indexOf(idx); if (LB.pos < 0) LB.pos = 0;
        lbShow();
        LB.el.classList.add("open"); LB.el.setAttribute("aria-hidden", "false");
      }
      function lbClose() { LB.el.classList.remove("open"); LB.el.setAttribute("aria-hidden", "true"); LB.stage.innerHTML = ""; }
      function lbStep(dir) { if (!LB.order.length) return; LB.pos = (LB.pos + dir + LB.order.length) % LB.order.length; lbShow(); }
      document.getElementById("lbClose").addEventListener("click", lbClose);
      document.getElementById("lbPrev").addEventListener("click", function () { lbStep(-1); });
      document.getElementById("lbNext").addEventListener("click", function () { lbStep(1); });
      LB.el.addEventListener("click", function (e) { if (e.target === LB.el) lbClose(); });
      document.addEventListener("keydown", function (e) {
        if (!LB.el.classList.contains("open")) return;
        if (e.key === "Escape") lbClose();
        else if (e.key === "ArrowRight") lbStep(-1);
        else if (e.key === "ArrowLeft") lbStep(1);
      });

      function cell(it, idx) {
        var d = document.createElement("div");
        d.className = "gallery__item";
        d.setAttribute("data-idx", idx);
        d.style.cursor = "pointer";
        if (it.type === "video") {
          var id = ytId(it.url);
          var media = id
            ? '<img src="https://img.youtube.com/vi/' + id + '/hqdefault.jpg" alt="' + esc(it.caption || "") + '" style="pointer-events:none">'
            : '<video src="' + esc(it.url) + '" muted preload="metadata" style="width:100%;height:100%;object-fit:cover;pointer-events:none"></video>';
          d.innerHTML = media + '<span class="gallery__play">▶</span>';
        } else {
          d.innerHTML = '<img src="' + esc(it.url) + '" alt="' + esc(it.caption || "") + '" style="pointer-events:none">';
        }
        d.addEventListener("click", function () { lbOpen(idx); });
        if (it.caption) d.insertAdjacentHTML("beforeend", '<span class="gallery__cap">' + esc(it.caption) + "</span>");
        return d;
      }
      function render(items) {
        ITEMS = items.slice();
        grid.innerHTML = "";
        ITEMS.forEach(function (it, idx) { grid.appendChild(cell(it, idx)); });
      }

      var ready = (window.DTDB && DTDB.getGallery) ? DTDB.getGallery() : Promise.resolve([]);
      ready.then(function (items) {
        items = (items || []).filter(function (it) { return it.section === "podcast"; });
        if (!items.length) { empty.style.display = "block"; return; }
        empty.style.display = "none";
        render(items);
      }).catch(function () { empty.style.display = "block"; });
    })();
  </script>
</body>
