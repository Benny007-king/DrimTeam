<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <defs>
    <linearGradient id="textFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(0,0,0,0)"/>
      <stop offset="62%"  stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.88)"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="60%" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="400" y2="560">
      <stop offset="55%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.42)"/>
    </radialGradient>
  </defs>

  <!-- Base turf green -->
  <rect width="400" height="560" fill="#1a4a1a"/>

  <!-- Turf stripes (alternating lighter bands) -->
  <rect x="0" y="0"   width="400" height="40" fill="#1e5420"/>
  <rect x="0" y="80"  width="400" height="40" fill="#1e5420"/>
  <rect x="0" y="160" width="400" height="40" fill="#1e5420"/>
  <rect x="0" y="240" width="400" height="40" fill="#1e5420"/>
  <rect x="0" y="320" width="400" height="40" fill="#1e5420"/>
  <rect x="0" y="400" width="400" height="40" fill="#1e5420"/>
  <rect x="0" y="480" width="400" height="40" fill="#1e5420"/>

  <!-- Field boundary -->
  <rect x="24" y="18" width="352" height="524" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="3"/>

  <!-- Center line -->
  <line x1="24" y1="280" x2="376" y2="280" stroke="rgba(255,255,255,0.68)" stroke-width="2.5"/>

  <!-- Center circle -->
  <circle cx="200" cy="280" r="56" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2.5"/>
  <circle cx="200" cy="280" r="3.5" fill="rgba(255,255,255,0.85)"/>

  <!-- Top penalty area -->
  <rect x="88"  y="18"  width="224" height="84" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <!-- Top goal area -->
  <rect x="138" y="18"  width="124" height="36" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <!-- Top penalty spot -->
  <circle cx="200" cy="96" r="3" fill="rgba(255,255,255,0.75)"/>
  <!-- Top penalty arc -->
  <path d="M164,102 A43,43 0 0,1 236,102" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>

  <!-- Bottom penalty area -->
  <rect x="88"  y="458" width="224" height="84" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <!-- Bottom goal area -->
  <rect x="138" y="506" width="124" height="36" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <!-- Bottom penalty spot -->
  <circle cx="200" cy="464" r="3" fill="rgba(255,255,255,0.75)"/>
  <!-- Bottom penalty arc -->
  <path d="M164,458 A43,43 0 0,0 236,458" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>

  <!-- Corner arcs -->
  <path d="M24,30  A10,10 0 0,1 36,18"  fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <path d="M364,18 A10,10 0 0,1 376,30" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <path d="M24,530  A10,10 0 0,0 36,542"  fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
  <path d="M364,542 A10,10 0 0,0 376,530" fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>

  <!-- Vignette and text-readability overlay -->
  <rect width="400" height="560" fill="url(#vig)"/>
  <rect width="400" height="560" fill="url(#textFade)"/>
</svg>
